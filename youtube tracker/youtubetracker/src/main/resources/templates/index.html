<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
    <meta charset="UTF-8">
    <title>YouTube Trend Takipçisi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0f0f0f; color: #fff; }

        header {
            background: #ff0000;
            padding: 15px 30px;
            display: flex;
            align-items: center;
        }
        header h1 { font-size: 22px; }

        .filters {
            background: #1a1a1a;
            padding: 20px 30px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filters select, .filters input {
            padding: 10px 14px;
            border-radius: 8px;
            border: none;
            background: #333;
            color: #fff;
            font-size: 14px;
        }
        .filters button {
            padding: 10px 24px;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .filters button:hover { background: #cc0000; }

        .container { padding: 30px; }
        h2 { margin-bottom: 20px; font-size: 18px; color: #ff6666; border-left: 4px solid #ff0000; padding-left: 10px; }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 50px;
        }
        .video-card {
            background: #1e1e1e;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.2s;
        }
        .video-card:hover { transform: scale(1.03); }
        .video-card a { text-decoration: none; color: inherit; }
        .video-card img { width: 100%; height: 120px; object-fit: cover; }
        .video-info { padding: 10px; }
        .rank { font-size: 11px; color: #ff6666; font-weight: bold; margin-bottom: 4px; }
        .title {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .channel { font-size: 12px; color: #aaa; margin-bottom: 6px; }
        .stats { font-size: 11px; color: #888; display: flex; gap: 8px; }
        .empty { color: #888; padding: 20px; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <h1>📺 YouTube Trend Takipçisi</h1>
</header>

<div class="filters">
    <form th:action="@{/}" method="get" style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;">

        <label style="color:#aaa;font-size:14px;">Kategori:</label>
        <select name="categoryId">
            <option value="0"  th:selected="${selectedCategory == '0'}">🌍 Tümü</option>
            <option value="1"  th:selected="${selectedCategory == '1'}">🎬 Film & Animasyon</option>
            <option value="2"  th:selected="${selectedCategory == '2'}">🚗 Otomobil</option>
            <option value="10" th:selected="${selectedCategory == '10'}">🎵 Müzik</option>
            <option value="15" th:selected="${selectedCategory == '15'}">🐾 Evcil Hayvanlar</option>
            <option value="17" th:selected="${selectedCategory == '17'}">⚽ Spor</option>
            <option value="20" th:selected="${selectedCategory == '20'}">🎮 Oyun</option>
            <option value="22" th:selected="${selectedCategory == '22'}">👤 Bloglar</option>
            <option value="23" th:selected="${selectedCategory == '23'}">😂 Komedi</option>
            <option value="24" th:selected="${selectedCategory == '24'}">🎭 Eğlence</option>
            <option value="25" th:selected="${selectedCategory == '25'}">📰 Haberler</option>
            <option value="28" th:selected="${selectedCategory == '28'}">🔬 Bilim & Teknoloji</option>
        </select>

        <label style="color:#aaa;font-size:14px;">Ülke:</label>
        <input type="text" name="regionCode"
               th:value="${regionCode}"
               placeholder="TR, US, DE..."
               style="width:70px;" />

        <button type="submit">🔍 Ara</button>
    </form>
</div>

<div class="container">

    <h2>🌍 Dünya Geneli En Çok İzlenen 50 Video</h2>
    <div class="video-grid" th:if="${not #lists.isEmpty(globalVideos)}">
        <div class="video-card" th:each="video, iter : ${globalVideos}">
            <a th:href="'https://www.youtube.com/watch?v=' + ${video.videoId}" target="_blank">
                <img th:src="${video.thumbnailUrl}" th:alt="${video.title}" />
                <div class="video-info">
                    <div class="rank">#<span th:text="${iter.index + 1}"></span></div>
                    <div class="title" th:text="${video.title}"></div>
                    <div class="channel" th:text="${video.channelTitle}"></div>
                    <div class="stats">
                        <span>👁 <span th:text="${video.viewCount}"></span></span>
                        <span>👍 <span th:text="${video.likeCount}"></span></span>
                    </div>
                </div>
            </a>
        </div>
    </div>
    <p class="empty" th:if="${#lists.isEmpty(globalVideos)}">❌ Video bulunamadı. API anahtarını kontrol et.</p>

    <h2>📍 <span th:text="${regionCode}"></span> - En Çok İzlenen 10 Video</h2>
    <div class="video-grid" th:if="${not #lists.isEmpty(localVideos)}">
        <div class="video-card" th:each="video, iter : ${localVideos}">
            <a th:href="'https://www.youtube.com/watch?v=' + ${video.videoId}" target="_blank">
                <img th:src="${video.thumbnailUrl}" th:alt="${video.title}" />
                <div class="video-info">
                    <div class="rank">#<span th:text="${iter.index + 1}"></span></div>
                    <div class="title" th:text="${video.title}"></div>
                    <div class="channel" th:text="${video.channelTitle}"></div>
                    <div class="stats">
                        <span>👁 <span th:text="${video.viewCount}"></span></span>
                        <span>👍 <span th:text="${video.likeCount}"></span></span>
                    </div>
                </div>
            </a>
        </div>
    </div>
    <p class="empty" th:if="${#lists.isEmpty(localVideos)}">❌ Video bulunamadı.</p>

</div>
</body>
</html>
